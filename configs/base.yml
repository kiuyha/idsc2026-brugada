# Base configuration - all experiments inherit from this
experiment_name: "baseline"
seed: 42

# Data
data:
  path: "experiments/physionet.org/files/brugada-huca/1.0.0"
  leads: 12

  # Data splits
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

  # Data augmentation
  augmentation:
    enabled: false
    noise_std: 0.01
    time_shift: 0.1
    amplitude_scale: 0.1

  batch_size: 16
  normalize: "zscore_per_lead"  # Options: zscore_per_lead, zscore_global, minmax
  correlation_threshold: 0.8
  anatomic_weight: 0.75

# Model architecture
model:
  type: "resnet_baseline"  # Options: resnet_baseline, spatial_gnn
  params:
    dropout: 0.4
    resnet_channels: [48, 96, 192]
    kernel_size: 7

# Multi-task setup
tasks:
  brugada:
    weight: 1.0
    enabled: true
  basal_pattern:
    weight: 0.3
    enabled: false
  sudden_death:
    weight: 0.3
    enabled: false

# Training
training:
  epochs: 150
  optimizer: "adamw"
  learning_rate: 0.001
  weight_decay: 0.0001

  # Scheduler
  scheduler: "cosine"  # Options: cosine, plateau, step
  warmup_epochs: 10
  min_lr: !!float 1e-6

  # Early stopping
  early_stopping_patience: 15

  # Training optimization
  use_mixing_precision: false
  gradient_clip_norm: 1.0

  # Loss function
  loss_function: "focal"  # Options: focal, bce
  loss_params:
    alpha: 0.79 # Calculated from 287/(76+287)
    gamma: 2.0
    reduction: "mean"  # Options: mean, sum or none

  # Checkpointing
  save_best_only: true
  checkpoint_dir: "experiments"
  checkpoint_name: "best_model.pt"

  # Logging
  log_interval: 50
  save_plots: true
  verbose: true

evaluation:
  metrics_list: ["accuracy", "precision", "recall", "f1", "f2", "auc"]
  primary_metric: "f2"

# Hardware
device: "auto" # Options: "cpu", "cuda", "auto"
num_workers: -1